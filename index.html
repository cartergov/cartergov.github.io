<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>香港即時風速</title>
</head>
<body>
    <h1>全港即時風速</h1>
    <div id="status">正在讀取...</div>
    <div id="content"></div>

    <script>
        const url = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc';

        async function updateWeather() {
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // --- 診斷與容錯邏輯 ---
                // 我們直接看 data 裡面有什麼，自動找出風速陣列
                let windData = null;
                if (data.wind && data.wind.speed && data.wind.speed.data) {
                    windData = data.wind.speed.data;
                } else {
                    console.error("結構偵測失敗，完整物件為:", data);
                    throw new Error("API 結構與程式不符，請看 Console 展開後的內容");
                }

                // 渲染
                let html = `<table><tr><th>測站</th><th>風速</th></tr>`;
                windData.forEach(s => {
                    html += `<tr><td>${s.station}</td><td>${s.value} ${s.unit}</td></tr>`;
                });
                html += `</table>`;
                
                document.getElementById('status').innerText = "數據更新成功！";
                document.getElementById('content').innerHTML = html;

            } catch (err) {
                document.getElementById('status').innerHTML = `<span style="color:red;">讀取錯誤: ${err.message}</span>`;
            }
        }
        updateWeather();
    </script>
</body>
</html>
