<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>香港即時風速測試</title>
</head>
<body>

    <h1>測試：香港天文台即時風速</h1>
    <div id="output" style="border: 1px solid #000; padding: 20px; width: 300px;">
        正在連接天文台伺服器...
    </div>

    <script>
        // 修正後的 API URL，改用更穩定的版本
        const url = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc';

        async function loadWeather() {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('伺服器回應錯誤');
                const data = await response.json();

                // 搜尋尖沙咀天星碼頭
                const stationName = '尖沙咀天星碼頭';
                const stationData = data.wind.speed.data.find(s => s.station === stationName);

                if (stationData) {
                    document.getElementById('output').innerHTML = `
                        <h3>地區：${stationData.station}</h3>
                        <p style="font-size: 20px; color: blue;">風速：${stationData.value} ${stationData.unit}</p>
                        <p>更新時間：${data.updateTime.split('T')[1].substring(0, 5)}</p>
                        <p style="color: green;">✔ 數據讀取成功！</p>
                    `;
                } else {
                    document.getElementById('output').innerText = '找不到該測站資料';
                }
            } catch (err) {
                document.getElementById('output').innerText = '讀取失敗: ' + err.message;
            }
        }
        loadWeather();
    </script>
</body>
</html>
