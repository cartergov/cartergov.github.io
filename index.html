<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>香港 18 區實時風力監測</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .station { margin: 8px 0; padding: 8px; background: #f9f9f9; border-radius: 5px; font-size: 0.85em; line-height: 1.4; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🌬️ 香港 18 區實時風力</h1>
    <div id="status">正在連接天文台伺服器...</div>
    <div id="app" class="grid"></div>

    <script>
        // 測站對照表
        const DISTRICT_MAP = {
            "中西區": ["香港公園", "中環碼頭", "青洲", "山頂"],
            "灣仔": ["跑馬地"],
            "東區": ["筲箕灣", "北角"],
            "南區": ["黃竹坑", "赤柱", "香港航海學校"],
            "油尖旺": ["天文台", "京士柏", "天星碼頭"],
            "九龍城": ["九龍城", "啟德跑道公園", "啟德"],
            "觀塘": ["觀塘"],
            "深水埗": ["深水埗"],
            "黃大仙": ["黃大仙", "大老山"],
            "葵青": ["青衣"],
            "荃灣": ["荃灣可觀", "荃灣城門谷", "大帽山"],
            "屯門": ["屯門"],
            "元朗": ["元朗公園", "流浮山", "石崗", "濕地公園"],
            "北區": ["打鼓嶺", "上水"],
            "大埔": ["大埔", "大美督", "大埔滘"],
            "沙田": ["沙田"],
            "西貢": ["西貢", "清水灣", "將軍澳", "北潭涌", "滘西洲", "塔門"],
            "離島": ["長洲", "坪洲", "昂坪", "赤鱲角", "南丫島", "長洲泳灘", "橫瀾島"]
        };

        // 使用 corsproxy.io 作為中轉，確保前端能正常抓取資料
        const API_URL = "https://corsproxy.io/?url=https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";

        async function fetchWindData() {
            const status = document.getElementById("status");
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API 回應失敗");
                
                const data = await response.json();
                const app = document.getElementById("app");
                app.innerHTML = "";

                for (const [dist, stations] of Object.entries(DISTRICT_MAP)) {
                    let html = `<div class="card"><h2>${dist}</h2>`;
                    stations.forEach(stName => {
                        const wind = data.wind.data.find(w => w.place === stName);
                        html += `<div class="station">
                            <strong>${stName}</strong><br>
                            🧭 方向: ${wind ? wind.direction : "N/A"}<br>
                            💨 平均風速: ${wind ? wind.speed + " km/h" : "N/A"}<br>
                            🌪️ 最高陣風: ${wind ? wind.gust + " km/h" : "N/A"}
                        </div>`;
                    });
                    html += `</div>`;
                    app.innerHTML += html;
                }
                status.innerText = "最後更新：" + new Date().toLocaleTimeString();
            } catch (err) {
                status.innerHTML = `<span class="error">資料載入失敗: ${err.message}。請確認網頁部署環境。</span>`;
            }
        }

        fetchWindData();
        setInterval(fetchWindData, 600000);
    </script>
</body>
</html>
