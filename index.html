<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>香港實時風速</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #eee; }
    </style>
</head>
<body>
    <h1>香港實時風速</h1>
    <div id="msg">載入中...</div>
    <table id="weather-table">
        <thead><tr><th>測站</th><th>風速 (km/h)</th></tr></thead>
        <tbody></tbody>
    </table>

    <script>
        // 使用天文台的官方 API
        const url = 'https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc';

        async function init() {
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                // 天文台數據路徑：data.wind.speed.data
                const stations = data.wind.speed.data;
                const tbody = document.querySelector('#weather-table tbody');
                
                tbody.innerHTML = '';
                stations.forEach(s => {
                    tbody.innerHTML += `<tr><td>${s.station}</td><td>${s.value}</td></tr>`;
                });
                
                document.getElementById('msg').innerText = "最後更新: " + data.updateTime;
            } catch (e) {
                document.getElementById('msg').innerHTML = "<span style='color:red'>讀取失敗，請檢查網路或 API 狀態。</span>";
                console.error(e);
            }
        }
        init();
    </script>
</body>
</html>
