<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港 18 區即時天氣儀表板</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .weather-card { transition: all 0.3s ease; }
        .weather-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <header class="bg-blue-600 text-white shadow-md p-4">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
            <h1 class="text-2xl font-bold tracking-wide">⛈️ 香港 18 區即時天氣</h1>
            <div class="text-sm bg-blue-700 px-3 py-1.5 rounded-lg border border-blue-500 text-center">
                系統狀態：<span id="update-status" class="font-semibold text-green-300">正在載入...</span><br>
                <span class="text-xs text-blue-200">每 10 分鐘自動更新一次</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 lg:col-span-2">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-blue-600">
                    🔮 香港網格點降雨臨近預報 (未來 2 小時)
                </h2>
                <div id="nowcast-container" class="text-gray-600 space-y-2 text-sm">
                    <p class="animate-pulse">正在獲取天文台臨近預報數據...</p>
                </div>
            </div>
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-amber-600">
                    ⚠️ 現正生效天氣警告
                </h2>
                <div id="warning-container" class="text-sm text-gray-600">
                    <p class="animate-pulse">正在檢查警告信號...</p>
                </div>
            </div>
        </section>

        <section class="mb-4 flex justify-between items-center">
            <h2 class="text-xl font-bold border-l-4 border-blue-600 pl-2">各區自動氣象站實時數據</h2>
            <button onclick="fetchWeatherData()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 text-sm rounded transition cursor-pointer">
                🔄 手動刷新
            </button>
        </section>

        <div id="weather-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div id="loading-fallback" class="p-10 text-center text-gray-400 col-span-full animate-pulse">數據載入中，請稍候...</div>
        </div>

    </main>

    <footer class="text-center py-6 text-xs text-gray-400 border-t border-gray-200 mt-12">
        數據來源：香港天文台開放數據 API (DATA.GOV.HK)<br>
        © 18區天氣即時反映系統
    </footer>

    <script>
        const API_CURRENT = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc";
        const API_WARNING = "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc";

        async function fetchWeatherData() {
            document.getElementById('update-status').innerText = "更新中...";
            
            try {
                // 發送請求
                const [resCurrent, resWarning] = await Promise.all([
                    fetch(API_CURRENT),
                    fetch(API_WARNING).catch(() => null)
                ]);

                if (!resCurrent.ok) throw new Error("天文台主要 API 連線失敗");

                const currentData = await resCurrent.json();
                let warningData = {};
                if (resWarning && resWarning.ok) {
                    try { warningData = await resWarning.json(); } catch(e) {}
                }

                // 渲染組件
                renderStatus(currentData.updateTime);
                renderWarnings(warningData);
                renderNowcast(currentData.rainfall);
                renderWeatherGrid(currentData);

            } catch (error) {
                console.error("獲取氣象數據失敗:", error);
                document.getElementById('update-status').innerText = "連線失敗";
                document.getElementById('update-status').className = "font-semibold text-red-400";
                
                // 發生錯誤時，將「載入中」替換成錯誤提示，不再死當
                document.getElementById('weather-grid').innerHTML = `
                    <div class="p-10 text-center text-red-500 col-span-full font-medium">
                        ❌ 數據載入失敗。請檢查網路連線，或確認是否因本地檔案瀏覽受到 CORS 限制。
                    </div>`;
            }
        }

        function renderStatus(updateTime) {
            if(!updateTime) return;
            const time = new Date(updateTime).toLocaleTimeString('zh-HK', {hour: '2-digit', minute:'2-digit'});
            const statusEl = document.getElementById('update-status');
            statusEl.innerText = `已更新 ${time}`;
            statusEl.className = "font-semibold text-green-300";
        }

        function renderWarnings(data) {
            const container = document.getElementById('warning-container');
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = `<div class="bg-green-50 text-green-700 p-3 rounded border border-green-200">🟢 現時無生效的天氣警告。</div>`;
                return;
            }
            let html = '<div class="space-y-2">';
            for (let key in data) {
                html += `<div class="bg-red-50 text-red-700 p-2.5 rounded border border-red-200 font-medium">⚠️ ${data[key].name}</div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function renderNowcast(rainfallData) {
            const container = document.getElementById('nowcast-container');
            let maxRainStation = "無";
            let maxRainVal = 0;

            if (rainfallData && rainfallData.data) {
                rainfallData.data.forEach(st => {
                    if(st.max > maxRainVal) {
                        maxRainVal = st.max;
                        st.place = st.place.replace("區", "");
                        maxRainStation = st.place;
                    }
                });
            }

            let nowcastText = `💡 <b>降雨趨勢提示：</b>根據最新自動氣象站觀測，`;
            if (maxRainVal > 0) {
                nowcastText += `過去一段時間本港局部地區有雨，其中 <b>${maxRainStation}</b> 錄得最高約 <b>${maxRainVal}mm</b> 雨量。`;
                nowcastText += `<br><span class="text-blue-600 font-medium">☔ 臨近預報提示：</span>預計未來兩小時該區及鄰近網格點降雨機率較高，市民出門請攜帶雨具。`;
            } else {
                nowcastText += `本港目前普遍天色良好，未錄得顯著降雨。`;
                nowcastText += `<br><span class="text-green-600 font-medium">☀️ 臨近預報提示：</span>預計未來兩小時各主網格點維持乾燥或無雨狀態。`;
            }

            container.innerHTML = `<p class="leading-relaxed">${nowcastText}</p>`;
        }

        function renderWeatherGrid(data) {
            const grid = document.getElementById('weather-grid');
            grid.innerHTML = ""; // 清空

            const stations = {};

            if(data.temperature && data.temperature.data) {
                data.temperature.data.forEach(item => {
                    initStation(stations, item.place);
                    stations[item.place].temp = item.value;
                });
            }

            let defaultHumidity = undefined;
            if(data.humidity && data.humidity.data) {
                if(data.humidity.data[0]) {
                    defaultHumidity = data.humidity.data[0].value;
                }
                data.humidity.data.forEach(item => {
                    if (stations[item.place]) {
                        stations[item.place].humidity = item.value;
                    } else {
                        initStation(stations, item.place);
                        stations[item.place].humidity = item.value;
                    }
                });
            }

            if(data.wind && data.wind.data) {
                data.wind.data.forEach(item => {
                    const stationName = item.station; 
                    if(stationName) {
                        initStation(stations, stationName);
                        stations[stationName].windDir = item.direction;
                        stations[stationName].windSpeed = item.speed;
                        stations[stationName].gust = item.gust;
                    }
                });
            }

            if(data.rainfall && data.rainfall.data) {
                data.rainfall.data.forEach(item => {
                    initStation(stations, item.place);
                    stations[item.place].rain = item.max; 
                });
            }

            let count = 0;
            for (let name in stations) {
                const st = stations[name];
                let displayName = name.endsWith("區") || name.endsWith("站") || name.endsWith("頂") ? name : name + " (站)";
                let currentHumid = st.humidity !== undefined ? st.humidity : defaultHumidity;

                let tempTxt = st.temp !== undefined ? `${st.temp} °C` : '--';
                let humidTxt = currentHumid !== undefined ? `${currentHumid} %` : '--';
                let rainTxt = st.rain !== undefined ? `${st.rain} mm` : '0 mm';
                
                let windTxt = '微風 / 數據暫缺';
                if (st.windSpeed !== undefined && st.windDir) {
                    if(st.windDir.trim() !== "") {
                        windTxt = `${st.windDir}風 ${st.windSpeed} 公里/小時`;
                    } else {
                        windTxt = `${st.windSpeed} 公里/小時`;
                    }
                }
                
                let gustTxt = st.gust !== undefined ? `${st.gust} 公里/小時` : '--';

                let borderHighlight = "border-gray-200";
                if (st.rain > 0 && st.rain < 10) borderHighlight = "border-blue-300 bg-blue-50";
                if (st.rain >= 10) borderHighlight = "border-red-300 bg-red-50";

                const card = document.createElement('div');
                card.className = `weather-card bg-white p-5 rounded-xl shadow-sm border ${borderHighlight} flex flex-col justify-between`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-bold text-lg text-gray-800">${displayName}</h3>
                            <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">即時數據</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 mb-4 bg-gray-50 p-2.5 rounded-lg">
                            <div class="text-center border-r border-gray-200">
                                <p class="text-xs text-gray-400">🌡️ 氣溫</p>
                                <p class="text-xl font-semibold text-red-500">${tempTxt}</p>
                            </div>
                            <div class="text-center">
                                <p class="text-xs text-gray-400">💧 濕度</p>
                                <p class="text-xl font-semibold text-teal-600">${humidTxt}</p>
                            </div>
                        </div>

                        <div class="space-y-1.5 text-sm">
                            <div class="flex justify-between">
                                <span class="text-gray-400">💨 10分鐘平均風：</span>
                                <span class="font-medium text-gray-700">${windTxt}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">⚡ 最高陣風：</span>
                                <span class="font-medium text-gray-700">${gustTxt}</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-gray-400">☔ 15-60分鐘雨量：</span>
                                <span class="font-medium ${st.rain > 0 ? 'text-blue-600 font-bold' : 'text-gray-700'}">${rainTxt}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                count++;
            }

            if(count === 0) {
                grid.innerHTML = `<div class="p-10 text-center text-red-400 col-span-full">未找到有效的分區數據。</div>`;
            }
        }

        function initStation(obj, name) {
            if (!obj[name]) {
                obj[name] = { temp: undefined, humidity: undefined, windDir: undefined, windSpeed: undefined, gust: undefined, rain: undefined };
            }
        }

        // 啟動
        fetchWeatherData();
        setInterval(fetchWeatherData, 10 * 60 * 1000);
    </script>
</body>
</html>
