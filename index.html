<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港即時天氣 18區儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen pb-12">

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-blue-400 flex items-center gap-2">
                ⛈️ 香港天氣 18區實時儀表板
            </h1>
            <div class="text-sm bg-gray-700 px-4 py-2 rounded-lg border border-gray-600 text-center sm:text-right">
                <span class="text-gray-400">最後更新時間：</span>
                <span id="update-time" class="font-mono text-yellow-400 font-bold">載入中...</span>
                <span class="text-xs block text-gray-400 mt-0.5">（每 10 分鐘自動更新）</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 mt-6 space-y-6">

        <div id="cors-warning" class="hidden bg-yellow-950/50 border border-yellow-600 text-yellow-200 p-4 rounded-xl text-sm">
            ⚠️ <b>偵測到 API 讀取失敗（可能是 CORS 跨網域限制）：</b> <br>
            香港天文台 API 不允許瀏覽器直接跨域讀取。本地測試時，請使用 Chrome 擴充功能（如 <a href="https://chromewebstore.google.com/detail/allow-cors-access-control/lhobafceggmhbdlmeledghocmkkfaddm" target="_blank" class="underline text-blue-400 font-bold">Allow CORS</a>）開啟權限，或將此網頁佈署至帶有 Proxy 的伺服器中。
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-sm lg:col-span-1">
                <h2 class="text-lg font-semibold mb-4 text-orange-400 border-b border-gray-700 pb-2 flex items-center gap-2">
                    ⚠️ 現時天氣警告
                </h2>
                <div id="warning-container" class="space-y-2 max-h-[250px] overflow-y-auto">
                    <p class="text-gray-400 italic">正在獲取警告訊號...</p>
                </div>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-sm lg:col-span-2">
                <h2 class="text-lg font-semibold mb-4 text-blue-400 border-b border-gray-700 pb-2 flex items-center gap-2">
                    🔮 網格點降雨臨近預報 (未來降雨趨勢)
                </h2>
                <div id="nowcast-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[250px] overflow-y-auto text-sm">
                    <p class="text-gray-400 italic">正在獲取預報數據...</p>
                </div>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold mb-4 text-emerald-400 flex items-center gap-2">
                📍 18區詳細觀測數據 (按區分組顯示多觀測站)
            </h2>
            <div id="district-container" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                <div class="text-center py-12 text-gray-400 col-span-full">正在初始化 18 區觀測站數據...</div>
            </div>
        </div>

    </main>
