<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>香港 18 區天氣實況 - 完整版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #eef2f7; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #1e3a8a; border-bottom: 2px solid #3498db; padding-bottom: 5px; margin-top: 0; }
        .station { margin: 8px 0; padding: 10px; background: #f8fafc; border-radius: 6px; font-size: 0.85em; border: 1px solid #e2e8f0; }
        .val { font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
    <h1>🌤️ 香港 18 區實時監測</h1>
    <div id="status">最後更新：載入中...</div>
    <div id="app" class="grid"></div>

    <script>
        const DISTRICT_MAP = {
            "中西區": ["香港公園", "中環碼頭", "青洲", "山頂"],
            "灣仔": ["跑馬地"],
            "東區": ["筲箕灣", "北角"],
            "南區": ["黃竹坑", "赤柱", "香港航海學校"],
            "油尖旺": ["天文台", "京士柏", "天星碼頭"],
            "九龍城": ["九龍城", "啟德跑道公園", "啟德"],
            "觀塘": ["觀塘"],
            "深水埗": ["深水埗"],
            "黃大仙": ["黃大仙", "大老山"],
            "葵青": ["青衣"],
            "荃灣": ["荃灣可觀", "荃灣城門谷", "大帽山"],
            "屯門": ["屯門"],
            "元朗": ["元朗公園", "流浮山", "石崗", "濕地公園"],
            "北區": ["打鼓嶺", "上水"],
            "大埔": ["大埔", "大美督", "大埔滘"],
            "沙田": ["沙田"],
            "西貢": ["西貢", "清水灣", "將軍澳", "北潭涌", "滘西洲", "塔門"],
            "離島": ["長洲", "坪洲", "昂坪", "赤鱲角", "南丫島", "長洲泳灘", "橫瀾島"]
        };

        // 使用 corsproxy.io 解決 GitHub Pages 跨域存取 API 的問題
        const API_BASE = "https://corsproxy.io/?url=https://data.weather.gov.hk/weatherAPI/opendata/weather.php";

        async function updateWeather() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const app = document.getElementById("app");
                app.innerHTML = "";

                for (const [dist, stations] of Object.entries(DISTRICT_MAP)) {
                    let html = `<div class="card"><h2>${dist}</h2>`;
                    stations.forEach(stName => {
                        const temp = data.temperature.data.find(d => d.place === stName);
                        const hum = data.humidity.data.find(d => d.place === stName);
                        const wind = data.wind.data.find(d => d.place === stName);
                        const rain = data.rainfall.data.find(d => d.place === stName);

                        html += `<div class="station">
                            <strong>${stName}</strong><br>
                            🌡️ 氣溫: <span class="val">${temp?.value ?? "N/A"}°C</span> | 
                            💧 濕度: <span class="val">${hum?.value ?? "N/A"}%</span><br>
                            🧭 風向: <span class="val">${wind?.direction ?? "N/A"}</span> | 
                            💨 風速: <span class="val">${wind?.speed ?? "N/A"} km/h</span> | 
                            🌪️ 陣風: <span class="val">${wind?.gust ?? "N/A"} km/h</span><br>
                            ☔ 過去1小時雨量: <span class="val">${rain?.max ?? "0"} mm</span>
                        </div>`;
                    });
                    html += `</div>`;
                    app.innerHTML += html;
                }
                document.getElementById("status").innerText = "最後更新：" + new Date().toLocaleTimeString();
            } catch (err) {
                document.getElementById("status").innerText = "載入失敗，請確認網路環境。";
            }
        }

        updateWeather();
        setInterval(updateWeather, 600000); // 10分鐘更新
    </script>
</body>
</html>
