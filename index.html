<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>香港18區即時天氣 (手機定位版)</title>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom) + 1.5rem); }
    </style>
</head>

    <header class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4">
        <div class="max-w-md mx-auto flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-blue-400">⛈️ 香港分區即時天氣</h1>

                        <span class="inline-block w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                        <span id="update-status">正在獲取天文台數據...</span>
                    </p>
                </div>
                <button onclick="initWeather()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 p-2.5 rounded-xl border border-slate-700 active:scale-95 transition-all text-sm">
                    🔄 刷新
                </button>
            </div>
            
            <div class="flex gap-2">
                <input type="text" id="search-input" oninput="filterStations()" placeholder="🔍 輸入地區搜尋 (例: 沙田、尖沙咀)"

                <div id="gps-badge" class="bg-amber-500/10 border border-amber-500/30 text-amber-400 text-xs px-2 rounded-xl flex items-center justify-center whitespace-nowrap font-medium">
                    📍 定位中
                </div>
            </div>
        </div>
    </header>

                🔮 2小時降雨臨近預報趨勢
            </h2>
            <div id="nowcast-container" class="text-xs text-slate-300 leading-relaxed">
                正在分析全港氣象網格數據...
            </div>
        </section>
