<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熱帶氣旋整合資料庫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta http-equiv="refresh" content="600">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        /* 兩欄式網格 */
        .grid-2-cols { display: grid; gap: 1.25rem; grid-template-columns: repeat(2, minmax(0, 1fr)); }
        /* 三欄式網格 */
        .grid-3-cols { display: grid; gap: 1.25rem; grid-template-columns: repeat(3, minmax(0, 1fr)); }
        
        @media (max-width: 1024px) { .grid-3-cols { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 768px) { .grid-2-cols, .grid-3-cols { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
        
        .card { background: white; padding: 1.25rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; transition: all 0.3s ease; }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-img { height: 260px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8fafc; border-radius: 12px; }
        .card-img img, .card-img iframe { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-6">

    <header class="mb-10 max-w-7xl mx-auto">
        <h1 class="text-4xl font-black tracking-tight text-slate-800 mb-2">熱帶氣旋整合資料庫</h1>
        <p class="text-slate-500 font-medium">最後更新：<span id="datetime"></span></p>
    </header>

    <main class="max-w-7xl mx-auto">
        <section class="mb-10">
            <h2 class="text-xl font-bold mb-6 flex items-center text-slate-700">
                <span class="bg-blue-600 w-1.5 h-6 rounded mr-3"></span>本地即時天氣重點
            </h2>
            
            <div class="grid-2-cols mb-6">
                <div class="card border-l-4 border-red-500">
                    <h3 class="font-bold text-lg text-red-600 mb-4">⚠️ 天氣警告</h3>
                    <div id="warning-data" class="text-sm leading-relaxed">讀取中...</div>
                </div>
                <div class="card border-l-4 border-blue-500">
                    <h3 class="font-bold text-lg text-blue-800 mb-4">📝 本港天氣概況</h3>
                    <div id="local-report" class="text-sm text-slate-600 h-32 overflow-y-auto mb-4 p-2 bg-slate-50 rounded-lg">正在讀取...</div>
                    <a href="https://i-lens.hk/hkweather/instant_chart.php?chart_type=DISTRICT_RAIN" target="_blank" class="text-teal-600 font-bold hover:underline flex items-center">
                        💧 查看各區雨量分佈圖 →
                    </a>
                </div>
            </div>

            <div class="grid-3-cols">
                <div class="card"><h3 class="font-bold mb-3 text-sm">雷達影像</h3><div class="card-img"><img src="https://www.weather.gov.hk/content_elements_v2/images/radar/front_R1.jpg"></div></div>
                <div class="card"><h3 class="font-bold mb-3 text-sm">全港平均風向及風速</h3><div class="card-img"><img src="https://www.hko.gov.hk/wxinfo/ts/windchk.png"></div></div>
                <div class="card"><h3 class="font-bold mb-3 text-sm">香港風力指數</h3><div class="card-img"><iframe src="https://v4.hkcoc.com/windindex/" class="border-0"></iframe></div></div>
            </div>
        </section>

        <section>
            <h2 class="text-xl font-bold mb-6 text-slate-700">氣象數值分析</h2>
            
            <div class="grid-2-cols">
                <div class="card"><h3 class="font-bold text-sm mb-2">西北太平洋衛星雲圖</h3><div class="card-img"><img src="https://v4.hkcoc.com/nwp.gif?v=44"></div></div>
                <div class="card"><h3 class="font-bold text-sm mb-2">熱帶氣旋路徑 (TSR)</h3><div class="card-img"><img src="https://www.tropicalstormrisk.com/tracker/dynamic/images/W.png"></div></div>
            </div>

            <div class="grid-3-cols mt-4">
                <div class="card"><h3 class="font-bold text-xs mb-2">衛星影像色調強化</h3><div class="card-img"><img src="https://tropic.ssec.wisc.edu/real-time/westpac/images/irngms.GIF"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">水氣圖</h3><div class="card-img"><img src="https://tropic.ssec.wisc.edu/real-time/westpac/images/xxwvgmsbbm.jpg"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">駛流平均</h3><div class="card-img"><img src="http://tropic.ssec.wisc.edu/real-time/westpac/winds/wgmsdlm4.GIF"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">垂直風切變</h3><div class="card-img"><img src="https://tropic.ssec.wisc.edu/real-time/westpac/winds/wgmswxc.GIF"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">地面氣溫圖</h3><div class="card-img"><img src="https://www.weather.gov.hk/nhm/img/nhmmap/sftt_c_00.png"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">海平面風場及濕度</h3><div class="card-img"><img src="https://www.weather.gov.hk/nhm/img/nhmmap/sfrh_c_00.png"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">850hPa 渦場分析</h3><div class="card-img"><img src="https://www.weather.gov.hk/nhm/img/nhmmap/up85vt_c_00.png"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">500hPa 位勢高度</h3><div class="card-img"><img src="https://www.weather.gov.hk/nhm/img/nhmmap/up50hh_c_00.png"></div></div>
                <div class="card"><h3 class="font-bold text-xs mb-2">200hPa 流線及急流</h3><div class="card-img"><img src="https://www.weather.gov.hk/nhm/img/nhmmap/up20is_c_00.png"></div></div>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('datetime').innerText = new Date().toLocaleString();
        
        async function loadWeather() {
            const fetchWithError = async (url, elementId) => {
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error();
                    return await res.json();
                } catch (e) {
                    document.getElementById(elementId).innerHTML = `<span class="text-red-500 text-xs">❌ 資料無法載入</span>`;
                    return null;
                }
            };
            const w = await fetchWithError('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc', 'warning-data');
            if(w) {
                let html = "";
                for (let k in w) if (w[k].name) html += `<p class="mb-1 text-sm">✅ ${w[k].name}</p>`;
                document.getElementById('warning-data').innerHTML = html || "目前沒有生效天氣警告。";
            }
            const f = await fetchWithError('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=flw&lang=tc', 'local-report');
            if(f) document.getElementById('local-report').innerHTML = `<strong>${f.forecastDesc}</strong><br><br>${f.generalSituation}`;
        }
        loadWeather();
    </script>
</body>
</html>
