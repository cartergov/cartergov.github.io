name: Fetch Weather Data
on:
  schedule:
    - cron: '*/10 * * * *' # 每 10 分鐘執行
  workflow_dispatch: # 允許手動觸發
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch and Save
        run: |
          curl -o data.json "https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc"
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Update weather data" || echo "No changes"
          git push